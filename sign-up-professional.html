<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USFITB2B - Dados do Proprietário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-screen flex overflow-hidden bg-white">

    <div class="hidden md:flex md:w-1/2 lg:w-5/12 bg-[#0f1523] relative flex-col justify-between p-12 overflow-hidden h-full">
        <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-usfit-cyan rounded-full mix-blend-multiply filter blur-[120px] opacity-10 translate-y-1/2 -translate-x-1/2 animate-pulse"></div>

        <div class="relative z-10 flex items-center gap-3">
            <div class="w-8 h-8"><img src="assets/images/logo.png"></div>
            <span class="font-semibold tracking-tight bg-clip-text text-transparent bg-usfit-gradient"><b class="text-white text-xl font-bold">USFIT</b>B2B</span>
        </div>

        <div class="relative z-10 max-w-md">
            <h2 class="text-3xl font-bold text-white mb-4 leading-tight">Quase lá.</h2>
            <p class="text-gray-400 text-lg leading-relaxed">
                Preencha seus dados profissionais. Você será o administrador da conta e o responsável pela operação.
            </p>
        </div>

        <div class="relative z-10 flex items-center gap-2">
            <div class="h-1 w-8 bg-gray-600 rounded-full"></div>
            <div class="h-1 w-8 bg-usfit-cyan rounded-full"></div>
            <span class="text-xs text-gray-500 ml-2">Passo 2 de 2</span>
        </div>
    </div>

    <div class="w-full md:w-1/2 lg:w-7/12 h-full bg-white overflow-y-auto relative">
        <div class="min-h-full flex items-center justify-center p-8 py-12">
            <div class="w-full max-w-lg space-y-8">

                <div class="text-center md:text-left">
                    <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Dados do Proprietário</h1>
                    <p class="text-gray-500 mt-2">Você será o administrador da conta. Preencha seus dados de acesso.</p>
                </div>

                <form class="space-y-5">

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">Nome Completo</label>
                        <input type="text" placeholder="Seu nome completo" class="usfit-input" required>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">E-mail de Acesso</label>
                            <input type="email" placeholder="seu@email.com" class="usfit-input" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">Telefone / WhatsApp</label>
                            <input type="tel" placeholder="(11) 99999-9999" class="usfit-input">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">Senha</label>
                            <input type="password" placeholder="Mínimo 8 caracteres" class="usfit-input" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">Repita sua senha</label>
                            <input type="password" placeholder="Confirme a senha" class="usfit-input" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-3 ml-1">Qual sua área de atuação?</label>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                            <label class="cursor-pointer group">
                                <input type="radio" name="role" value="trainer" class="radio-card-input hidden">
                                <div class="radio-card border border-gray-200 rounded-2xl p-4 text-center transition-all hover:border-usfit-cyan hover:bg-gray-50 h-full flex flex-col items-center justify-center gap-3">
                                    <div class="icon-wrapper w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 transition-colors group-hover:border-usfit-cyan group-hover:text-usfit-cyan">
                                        <i data-lucide="dumbbell" class="w-5 h-5"></i>
                                    </div>
                                    <span class="text-sm font-semibold text-gray-900">Personal Trainer</span>
                                </div>
                            </label>

                            <label class="cursor-pointer group">
                                <input type="radio" name="role" value="nutritionist" class="radio-card-input hidden">
                                <div class="radio-card border border-gray-200 rounded-2xl p-4 text-center transition-all hover:border-usfit-cyan hover:bg-gray-50 h-full flex flex-col items-center justify-center gap-3">
                                    <div class="icon-wrapper w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 transition-colors group-hover:border-usfit-cyan group-hover:text-usfit-cyan">
                                        <i data-lucide="utensils" class="w-5 h-5"></i>
                                    </div>
                                    <span class="text-sm font-semibold text-gray-900">Nutricionista</span>
                                </div>
                            </label>

                            <label class="cursor-pointer group">
                                <input type="radio" name="role" value="both" class="radio-card-input hidden" checked>
                                <div class="radio-card border border-gray-200 rounded-2xl p-4 text-center transition-all hover:border-usfit-cyan hover:bg-gray-50 h-full flex flex-col items-center justify-center gap-3">
                                    <div class="icon-wrapper w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 transition-colors group-hover:border-usfit-cyan group-hover:text-usfit-cyan">
                                        <i data-lucide="layers" class="w-5 h-5"></i>
                                    </div>
                                    <span class="text-sm font-semibold text-gray-900">Ambos</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div id="registro-fields" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div id="field-cref">
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">CREF</label>
                            <input type="text" placeholder="000000-G/SP" class="usfit-input">
                        </div>
                        <div id="field-crn">
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">CRN</label>
                            <input type="text" placeholder="00000/SP" class="usfit-input">
                        </div>
                    </div>

                    <div class="pt-2 flex flex-col gap-3">
                        <a href="dashboard.html" class="btn-primary">
                            Finalizar e Acessar <i data-lucide="check" class="w-4 h-4 ml-1"></i>
                        </a>
                        <a href="sign-up.html" class="btn-secondary flex items-center justify-center gap-1">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script src="assets/js/functions.js"></script>
    <script>
        const fieldCref = document.getElementById('field-cref');
        const fieldCrn  = document.getElementById('field-crn');

        function updateRegistro() {
            const role = document.querySelector('[name="role"]:checked')?.value;
            fieldCref.style.display = (role === 'trainer' || role === 'both') ? '' : 'none';
            fieldCrn.style.display  = (role === 'nutritionist' || role === 'both') ? '' : 'none';
        }

        document.querySelectorAll('[name="role"]').forEach(r => r.addEventListener('change', updateRegistro));
        updateRegistro();
    </script>
</body>
</html>
