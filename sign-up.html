<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USFITB2B - Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-screen flex overflow-hidden bg-white">

    <div class="hidden md:flex md:w-1/2 lg:w-5/12 bg-[#0f1523] relative flex-col justify-between p-12 overflow-hidden h-full">
        <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-usfit-blue rounded-full mix-blend-multiply filter blur-[120px] opacity-20 -translate-y-1/2 translate-x-1/2 animate-pulse"></div>

        <div class="relative z-10 flex items-center gap-3">
            <div class="w-8 h-8"><img src="assets/images/logo.png"></div>
            <span class="font-semibold tracking-tight bg-clip-text text-transparent bg-usfit-gradient"><b class="text-white text-xl font-bold">USFIT</b>B2B</span>
        </div>

        <div class="relative z-10 max-w-md">
            <h2 class="text-3xl font-bold text-white mb-4 leading-tight">Comece sua jornada.</h2>
            <ul class="space-y-4 text-gray-400">
                <li class="flex items-center gap-3">
                    <div class="p-1 rounded-full bg-usfit-gradient"><i data-lucide="check" class="w-3 h-3 text-white"></i></div>
                    <span>Prescrição ilimitada de treinos e dietas</span>
                </li>
                <li class="flex items-center gap-3">
                    <div class="p-1 rounded-full bg-usfit-gradient"><i data-lucide="check" class="w-3 h-3 text-white"></i></div>
                    <span>App exclusivo para seus alunos</span>
                </li>
                <li class="flex items-center gap-3">
                    <div class="p-1 rounded-full bg-usfit-gradient"><i data-lucide="check" class="w-3 h-3 text-white"></i></div>
                    <span>Gestão financeira e anamnese</span>
                </li>
            </ul>
        </div>

        <div class="relative z-10 flex items-center gap-2">
            <div class="h-1 w-8 bg-usfit-cyan rounded-full"></div>
            <div class="h-1 w-8 bg-gray-600 rounded-full"></div>
            <span class="text-xs text-gray-500 ml-2">Passo 1 de 2</span>
        </div>
    </div>

    <div class="w-full md:w-1/2 lg:w-7/12 h-full bg-white overflow-y-auto relative">
        <div class="min-h-full flex items-center justify-center p-8 py-12">
            <div class="w-full max-w-md space-y-6">
                
                <div class="text-center md:text-left">
                    <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Cadastre sua empresa</h1>
                    <p class="text-gray-500 mt-2">Escolha o tipo de operação e preencha os dados da empresa.</p>
                </div>

                <form action="#" class="space-y-5">

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2 ml-1">Como você opera?</label>
                        <div class="grid grid-cols-2 gap-4">
                            <label class="cursor-pointer group">
                                <input type="radio" name="account_type" value="professional" class="radio-card-input hidden" checked>
                                <div class="radio-card border border-gray-200 rounded-2xl p-4 transition-all hover:border-usfit-cyan hover:bg-gray-50 h-full">
                                    <div class="icon-wrapper w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 mb-3 transition-colors group-hover:border-usfit-cyan group-hover:text-usfit-cyan">
                                        <i data-lucide="user" class="w-5 h-5"></i>
                                    </div>
                                    <span class="block font-semibold text-gray-900">Profissional</span>
                                    <span class="text-xs text-gray-500">Personal ou Nutri autônomo (MEI).</span>
                                </div>
                            </label>

                            <label class="cursor-pointer group">
                                <input type="radio" name="account_type" value="consultancy" class="radio-card-input hidden">
                                <div class="radio-card border border-gray-200 rounded-2xl p-4 transition-all hover:border-usfit-cyan hover:bg-gray-50 h-full">
                                    <div class="icon-wrapper w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 mb-3 transition-colors group-hover:border-usfit-cyan group-hover:text-usfit-cyan">
                                        <i data-lucide="building-2" class="w-5 h-5"></i>
                                    </div>
                                    <span class="block font-semibold text-gray-900">Consultoria</span>
                                    <span class="text-xs text-gray-500">Gestão de equipe e múltiplos profissionais.</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">Nome da Empresa</label>
                        <input type="text" placeholder="Nome Fantasia ou Razão Social" class="usfit-input" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">CNPJ</label>
                        <input type="text" placeholder="00.000.000/0001-00" class="usfit-input" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">E-mail Comercial</label>
                            <input type="email" placeholder="contato@empresa.com" class="usfit-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">Telefone Comercial</label>
                            <input type="tel" placeholder="(11) 99999-9999" class="usfit-input">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">Estado</label>
                            <select id="select-estado" class="usfit-input">
                                <option value="">Selecione</option>
                                <option value="SP">SP — São Paulo</option>
                                <option value="RJ">RJ — Rio de Janeiro</option>
                                <option value="MG">MG — Minas Gerais</option>
                                <option value="RS">RS — Rio Grande do Sul</option>
                                <option value="PR">PR — Paraná</option>
                                <option value="SC">SC — Santa Catarina</option>
                                <option value="BA">BA — Bahia</option>
                                <option value="GO">GO — Goiás</option>
                                <option value="DF">DF — Distrito Federal</option>
                                <option value="PE">PE — Pernambuco</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">Cidade</label>
                            <select id="select-cidade" class="usfit-input" disabled>
                                <option value="">Selecione o Estado primeiro</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex items-center gap-2 ml-1">
                        <input type="checkbox" id="terms" class="rounded border-gray-300 text-usfit-cyan focus:ring-usfit-cyan">
                        <label for="terms" class="text-sm text-gray-500">Li e aceito os <a href="#" class="text-usfit-blue hover:underline">Termos de Uso</a>.</label>
                    </div>

                    <a id="btn-continuar" href="sign-up-professional.html" class="btn-primary">
                        Continuar <i data-lucide="arrow-right" class="w-4 h-4 ml-1"></i>
                    </a>
                </form>

                <p class="text-center text-sm text-gray-600">
                    Já tem uma conta? 
                    <a href="#" class="font-semibold text-usfit-blue hover:text-usfit-cyan hover:underline transition-colors">Fazer login</a>
                </p>

            </div>
        </div>
    </div>

    <script src="assets/js/functions.js"></script>
    <script>
        const cidadesPorEstado = {
            SP: ['Campinas', 'Ribeirão Preto', 'Santos', 'São Paulo'],
            RJ: ['Niterói', 'Petrópolis', 'Rio de Janeiro', 'Volta Redonda'],
            MG: ['Belo Horizonte', 'Juiz de Fora', 'Uberlândia'],
            RS: ['Caxias do Sul', 'Pelotas', 'Porto Alegre'],
            PR: ['Curitiba', 'Londrina', 'Maringá'],
            SC: ['Blumenau', 'Florianópolis', 'Joinville'],
            BA: ['Feira de Santana', 'Salvador'],
            GO: ['Anápolis', 'Goiânia'],
            DF: ['Brasília'],
            PE: ['Caruaru', 'Olinda', 'Recife'],
        };

        const selectEstado = document.getElementById('select-estado');
        const selectCidade = document.getElementById('select-cidade');

        selectEstado.addEventListener('change', () => {
            const uf = selectEstado.value;
            selectCidade.innerHTML = '';
            if (uf && cidadesPorEstado[uf]) {
                selectCidade.disabled = false;
                selectCidade.innerHTML = '<option value="">Selecione a cidade</option>';
                cidadesPorEstado[uf].forEach(cidade => {
                    const opt = document.createElement('option');
                    opt.value = cidade;
                    opt.textContent = cidade;
                    selectCidade.appendChild(opt);
                });
            } else {
                selectCidade.disabled = true;
                selectCidade.innerHTML = '<option value="">Selecione o Estado primeiro</option>';
            }
        });

        document.querySelectorAll('[name="account_type"]').forEach(radio => {
            radio.addEventListener('change', () => {
                document.getElementById('btn-continuar').href =
                    radio.value === 'professional'
                        ? 'sign-up-professional.html'
                        : 'sign-up-business.html';
            });
        });
    </script>
</body>
</html>
